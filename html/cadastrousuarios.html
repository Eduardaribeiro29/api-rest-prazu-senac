<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Prazu Oficial</title>
        <script> scripsrc.script.js </script>
    </head>
    <body>
        <h1>Prazu Oficial</h1>
        <h2>Formulário de cadastro</h2>
        <form> 
            <p>
                <label for="cadastro_nome">Nome completo:</label>
                <input id="cadastro_nome" type="text" placeholder="Nome completo" required>
            </p>
            <p>
                <label for="cadastro_email">Email:</label>
                <input id="cadastro_email" type="email" placeholder="nome@dominio.com" required>
            </p>
            <p>
                <label for="cadastro_telefone">Telefone:</label>
                <input id="cadastro_telefone" type="number" placeholder="99999-9999" required>
            </p>
            <p>
                <label for="cadastro_senha">Senha:</label>
                <input id="cadastro_senha" type="password">
            </p>
            <p>
                <label for="cadastro_senha_confirm">Confirme a senha:</label>
                <input id="cadastro_senha_confirm" type="password">
            </p>
        </form>

        <hr>
        <h2>Usuários cadastrados</h2>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Telefone</th>
        </tr>
    </body>
</html>
